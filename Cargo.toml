# SPDX-License-Identifier: Apache-2.0

[workspace]
resolver = "2"
members = [
    "crates/core",
    "crates/storage",
    "crates/imap-client",
    "crates/smtp-client",
    "crates/jmap-client",
    "crates/mime",
    "crates/sync",
    "crates/search",
    "crates/auth",
    "crates/ipc",
    "apps/desktop/src-tauri",
    "apps/desktop/ui",
    "xtask",
]

[workspace.package]
version = "0.0.0"
edition = "2021"
rust-version = "1.87"
license = "Apache-2.0"
repository = "https://github.com/johnathonfox/capytain"
authors = ["Capytain Contributors"]
publish = false

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
