# SPDX-License-Identifier: Apache-2.0

[workspace]
resolver = "2"
members = [
    "crates/core",
    "crates/storage",
    "crates/imap-client",
    "crates/smtp-client",
    "crates/jmap-client",
    "crates/mime",
    "crates/sync",
    "crates/search",
    "crates/auth",
    "crates/ipc",
    "crates/telemetry",
    "apps/desktop/src-tauri",
    "apps/desktop/ui",
    "apps/mailcli",
    "xtask",
]

[workspace.package]
version = "0.0.0"
edition = "2021"
rust-version = "1.88"
license = "Apache-2.0"
repository = "https://github.com/johnathonfox/capytain"
authors = ["Capytain Contributors"]
publish = false

[workspace.dependencies]
async-trait = "0.1"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["fs", "io-util", "macros", "rt-multi-thread", "sync"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
turso = "0.5"
zstd = { version = "0.13", default-features = false }

# Dev-only: property-testing for the storage layer round-trip suite.
proptest = "1"

# First-party workspace crates — reference by path so members always build
# against the in-tree version. The `version` pin matches `[workspace.package]`
# and gives cargo-deny a concrete version to check (it treats a bare
# `{ path = ... }` as a wildcard dep otherwise); `publish = false` means the
# version is only ever used as local metadata.
capytain-core = { path = "crates/core", version = "=0.0.0" }
capytain-telemetry = { path = "crates/telemetry", version = "=0.0.0" }

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
