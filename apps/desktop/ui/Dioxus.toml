#
# Dioxus CLI configuration. Read by `dx build --platform web` and
# `dx serve`. Keep the output layout at `dist/`; Tauri's
# `frontendDist` in `apps/desktop/src-tauri/tauri.conf.json` points at
# `../ui/dist` so the two stay in sync.

[application]
name = "qsl"
default_platform = "web"

[web.app]
title = "QSL"

[web.watcher]
reload_html = true
watch_path = ["src", "assets"]

[web.resource]
# Stylesheet is wired via the `asset!()` macro in `src/app.rs` so dx
# 0.7 actually copies the file (the `style = [...]` array injects a
# `<link>` tag but doesn't bundle the file). Leaving these arrays
# empty avoids the duplicate `<link>` injection.
style = []
script = []

[web.resource.dev]
style = []
script = []
