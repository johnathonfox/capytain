Mailchimp-style promotional email. These are historically the worst
offenders for old-style table-based, bulletproof-button HTML — every
layout primitive expressed via nested tables so Outlook 2007 renders it
recognizably. QSL won't render to Outlook, but our renderer does
need to cope with the shape: deeply nested tables, repeated width
attributes, mso-* MSO-conditional comments, image-heavy hero panel.
-->
