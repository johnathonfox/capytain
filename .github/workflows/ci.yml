name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Linux joins Windows now that the Phase 0 Week 6 Servo-backed
        # renderer has a validated Linux path (see Day 2 PR and
        # docs/servo-composition.md). macOS is deliberately left out:
        # the macOS renderer was written without Mac hardware and is
        # marked UNVERIFIED — adding a macOS job now would publish
        # green ticks we can't trust. It rejoins after a Mac-hardware
        # session validates `new_macos`. Servo-on-Windows is a separate
        # PR; for now the Windows job excludes `capytain-renderer` and
        # `capytain-desktop` from the workspace build (because they
        # pull in Servo's toolchain) and verifies their no-servo paths
        # explicitly.
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      # Tauri 2 needs webkit2gtk + friends on Linux; Servo 0.1.0 additionally
      # needs cmake, clang, fontconfig / freetype / harfbuzz, gstreamer, and
      # libssl (see docs/servo-composition.md §7). macOS (WKWebView) and
      # Windows (WebView2 Evergreen Runtime) ship what Tauri needs out of
      # the box for the *system* webview; Servo on Windows is out of scope
      # for this PR, so the Windows job deliberately skips Servo build deps.
      - name: Install Tauri + Servo Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            cmake \
            clang \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libglib2.0-dev

      - name: Format
        run: cargo fmt --all --check

      # --- Linux path: full build with Servo enabled everywhere ---

      - name: Clippy (Linux — full workspace, Servo on)
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --workspace --all-targets
      - name: Test (Linux — full workspace)
        if: matrix.os == 'ubuntu-latest'
        run: cargo test --workspace
      - name: Check capytain-renderer with servo feature (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: cargo check -p capytain-renderer --features servo

      # --- Windows path: workspace minus Servo-toolchain consumers,
      # then each excluded crate checked in its no-servo shape ---

      - name: Clippy (Windows — workspace minus Servo consumers)
        if: matrix.os == 'windows-latest'
        run: cargo clippy --workspace --all-targets --exclude capytain-renderer --exclude capytain-desktop
      - name: Test (Windows — workspace minus Servo consumers)
        if: matrix.os == 'windows-latest'
        run: cargo test --workspace --exclude capytain-renderer --exclude capytain-desktop
      - name: Clippy capytain-renderer without servo (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo clippy -p capytain-renderer --no-default-features --all-targets
      - name: Clippy capytain-desktop without servo (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo clippy -p capytain-desktop --no-default-features --all-targets
      - name: Test capytain-desktop without servo (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo test -p capytain-desktop --no-default-features

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  reuse:
    name: reuse lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: fsfe/reuse-action@v4
