name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Linux and Windows both build the full workspace with Servo
        # enabled. macOS is deliberately left out: the macOS renderer
        # (`crates/renderer/src/servo/macos.rs`) is marked UNVERIFIED
        # — written without Mac hardware in Phase 0 Week 6 Day 2 — so
        # publishing green CI ticks for macOS would be noise. The
        # macOS job rejoins after a hardware-backed session validates
        # `new_macos`.
        #
        # Windows graduated from "workspace minus Servo consumers +
        # optional compile probe" (Day 3) to a first-class full-
        # workspace build once PR #20's optional probe came back green,
        # confirming Servo 0.1.0 compiles on stock `windows-latest`
        # without any extra native-dep installation. Runtime validation
        # on Windows still needs a hardware-backed session; the CI
        # here covers compile + clippy + unit tests of the Servo-
        # enabled tree.
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      # Tauri 2 needs webkit2gtk + friends on Linux; Servo 0.1.0
      # additionally needs cmake, clang, fontconfig / freetype /
      # harfbuzz, gstreamer, and libssl (see docs/servo-composition.md
      # §7). macOS (WKWebView) and Windows (WebView2 Evergreen Runtime)
      # ship what Tauri needs out of the box for the system webview;
      # Servo 0.1.0 additionally turns out to compile on stock
      # `windows-latest` without any extra installs (confirmed by the
      # optional compile probe in PR #20), so no Windows install step
      # is needed here.
      - name: Install Tauri + Servo Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            cmake \
            clang \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libglib2.0-dev

      - name: Format
        run: cargo fmt --all --check

      # --- Full workspace (Servo enabled) on both OSes ---

      - name: Clippy (workspace, Servo on)
        run: cargo clippy --workspace --all-targets
      - name: Test (workspace)
        run: cargo test --workspace
      - name: Check capytain-renderer with servo feature explicitly
        run: cargo check -p capytain-renderer --features servo

      # --- No-Servo fallback verification (Linux only; Windows full
      # workspace above already covers it) ---
      #
      # The `servo` feature is off on `capytain-renderer` by default;
      # downstream crates that depend on it via `capytain-core` only
      # (the trait + NullRenderer path) must keep compiling when
      # Servo is excluded. Rerun Clippy with `--no-default-features`
      # on Linux to guard that path.
      - name: Clippy capytain-renderer without servo (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy -p capytain-renderer --no-default-features --all-targets

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  reuse:
    name: reuse lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: fsfe/reuse-action@v4
