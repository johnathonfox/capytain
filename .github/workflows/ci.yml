name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  # `qsl-desktop`'s build.rs invokes `dx build --platform web` on
  # the Dioxus UI so `cargo run` produces a working bundle. CI only
  # runs check / clippy / test — it never launches the binary — and
  # installing `dioxus-cli` from source would add ~4 minutes to every
  # job. Skip the UI build step for CI builds.
  QSL_SKIP_UI_BUILD: "1"

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Linux is the only CI target right now. macOS was always
        # excluded — the macOS renderer (`crates/renderer/src/servo/macos.rs`)
        # is marked UNVERIFIED and publishing green CI ticks for an
        # untested path is noise. Windows was a first-class build until
        # the popup-reader work landed (PR #76); the new
        # `messages_open_in_window` flow uses Tauri 2 APIs that need
        # interactive validation on Windows hardware before CI can
        # rely on it again. Re-add `windows-latest` to this list and
        # the matching `required_status_checks` entry on the
        # `main`-branch ruleset (id 15578570) once the Windows path is
        # verified end-to-end.
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      # Tauri 2 needs webkit2gtk + friends on Linux; Servo 0.1.0
      # additionally needs cmake, clang, fontconfig / freetype /
      # harfbuzz, gstreamer, and libssl (see docs/servo-composition.md
      # §7).
      - name: Install Tauri + Servo Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            cmake \
            clang \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libglib2.0-dev

      - name: Format
        run: cargo fmt --all --check

      # --- Full workspace (Servo enabled) on both OSes ---

      - name: Clippy (workspace, Servo on)
        run: cargo clippy --workspace --all-targets
      - name: Test (workspace)
        run: cargo test --workspace
      - name: Check qsl-renderer with servo feature explicitly
        run: cargo check -p qsl-renderer --features servo

      # --- No-Servo fallback verification ---
      #
      # The `servo` feature is off on `qsl-renderer` by default;
      # downstream crates that depend on it via `qsl-core` only
      # (the trait + NullRenderer path) must keep compiling when
      # Servo is excluded. Rerun Clippy with `--no-default-features`
      # to guard that path.
      - name: Clippy qsl-renderer without servo
        run: cargo clippy -p qsl-renderer --no-default-features --all-targets

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned to the exact SHA of v2.0.17 (cargo-deny 0.19.2).
      # The floating `@v2` tag hit an advisory-db cache race on
      # PR #22 (`failed to parse ISO-8601 timestamp 'fatal: cannot
      # change to /usr/local/cargo/advisory-dbs/...'`) — bumping to
      # a pinned SHA removes the "whatever v2 points to this week"
      # variable. Re-pin when a new release adds something we need.
      - uses: EmbarkStudios/cargo-deny-action@a4d2d701318fdc1c6ae17ba8cea8f329c5110eb2 # v2.0.17

  reuse:
    name: reuse lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: fsfe/reuse-action@v4
