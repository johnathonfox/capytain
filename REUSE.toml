# SPDX-License-Identifier: Apache-2.0
#
# REUSE.toml provides license and copyright for files that cannot or should
# not carry inline SPDX headers:
#
#   - Markdown documents (headers would show up in rendered output)
#   - YAML/JSON config consumed by tools that trip on non-doc comments
#   - Generated files (Cargo.lock)
#   - Dotfiles (.gitignore, .gitattributes)
#
# Source files under version control in the workspace that *can* carry
# inline headers still should — REUSE treats inline metadata as
# authoritative and layered coverage from this file as a fallback.
#
# Spec: https://reuse.software/spec-3.3/

version = 1

[[annotations]]
path = [
    "**.md",
    ".gitignore",
    ".gitattributes",
    "Cargo.lock",
    ".github/**.md",
    ".github/**.yml",
    ".github/**.yaml",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Capytain Contributors"
SPDX-License-Identifier = "Apache-2.0"

# Source files that carry inline `SPDX-License-Identifier` but no
# `SPDX-FileCopyrightText`: supply the copyright from here.
[[annotations]]
path = [
    "**.rs",
    "**.toml",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Capytain Contributors"

# SQL migrations and proptest regressions (the latter is generated on test
# failure and tracked in git so failures reproduce across machines).
[[annotations]]
path = [
    "crates/storage/migrations/**.sql",
    "crates/storage/tests/**.proptest-regressions",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Capytain Contributors"
SPDX-License-Identifier = "Apache-2.0"

# Tauri configuration JSON and Dioxus HTML/CSS entrypoints. JSON files
# have no comment syntax so REUSE metadata can't ride inline; HTML/CSS
# files carry inline SPDX headers but we add the copyright attribution
# here to keep file fronts uncluttered.
[[annotations]]
path = [
    "apps/desktop/src-tauri/tauri.conf.json",
    "apps/desktop/src-tauri/capabilities/**.json",
    "apps/desktop/ui/index.html",
    "apps/desktop/ui/assets/**.css",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Capytain Contributors"
SPDX-License-Identifier = "Apache-2.0"

# Placeholder application icons. Generated programmatically during Phase
# 0 Week 5 scaffolding; binary assets so REUSE metadata rides here rather
# than inline. Real icons land with the visual design pass in Phase 1.
[[annotations]]
path = [
    "apps/desktop/src-tauri/icons/**",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Capytain Contributors"
SPDX-License-Identifier = "Apache-2.0"

# Build-script output. `tauri-build` regenerates `apps/desktop/
# src-tauri/gen/` on every `cargo check` from tauri.conf.json and the
# capability files; `.gitignore` keeps it out of the repo but
# contributors who run `reuse lint` after a local build would see it on
# disk. Covering it here means that run still passes.
[[annotations]]
path = [
    "apps/desktop/src-tauri/gen/**",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Capytain Contributors"
SPDX-License-Identifier = "Apache-2.0"

# Phase 0 Week 6 Day 5 corpus reference outputs — PNG screenshots +
# SHA-256 hashes produced by `cargo test -p capytain-renderer
# --features servo --test corpus -- --nocapture CAPYTAIN_CORPUS_REGEN=1`.
# Binary + content-addressed hash files can't carry inline SPDX metadata,
# so they're covered here. The fixtures next door (`**/fixtures/*.html`)
# do carry inline SPDX headers in HTML comments and pass `reuse lint`
# without needing a REUSE.toml entry.
[[annotations]]
path = [
    "crates/renderer/tests/corpus/reference/**",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Capytain Contributors"
SPDX-License-Identifier = "Apache-2.0"
