# SPDX-License-Identifier: Apache-2.0
#
# cargo-deny policy for Capytain.
#
# Policy shape (DESIGN.md §10.2 step 6):
#   (a) Fail the build on any dependency under GPL, AGPL, SSPL, or any
#       non-OSI license.
#   (b) Require explicit, deliberate review before vendoring copyleft
#       licenses (MPL, LGPL). We implement "warn + special handling" as
#       "fail by default; add to `[licenses.exceptions]` with a per-crate
#       justification" — the exceptions entry is the special handling.
#   (c) Every workspace `Cargo.toml` declares `license = "Apache-2.0"`.
#       cargo-deny checks workspace members alongside dependencies, so the
#       allow-list below enforces this automatically.
#
# All four sections use the v2 schema (cargo-deny 0.14+).

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
    # paste 1.0.15 — unmaintained (RUSTSEC-2024-0436). Transitive dep pulled
    # in through Turso / clap ancestry. The advisory is informational, not a
    # vulnerability; upstream recommends `pastey` as a drop-in, but we're
    # not in a position to force that substitution through our dep graph.
    # Revisit when Turso or clap bump to a paste-free release.
    "RUSTSEC-2024-0436",

    # Unmaintained-advisory ignores for the Tauri 2 desktop shell (Phase 0
    # Week 5). Tauri's Linux backend pulls in the gtk-rs GTK3 bindings
    # transitively via tao/wry/tray-icon/muda. The upstream recommendation
    # is gtk4-rs, but Tauri 2 has not yet migrated. These are
    # informational unmaintained advisories, not vulnerabilities. Revisit
    # when Tauri ships a GTK4 backend.
    "RUSTSEC-2024-0411", # atk / gtk-rs GTK3
    "RUSTSEC-2024-0412", # atk-sys / gtk-rs GTK3
    "RUSTSEC-2024-0413", # gdk / gtk-rs GTK3
    "RUSTSEC-2024-0415", # gdk-sys / gtk-rs GTK3
    "RUSTSEC-2024-0416", # gdkx11 / gtk-rs GTK3
    "RUSTSEC-2024-0418", # gtk / gtk-rs GTK3
    "RUSTSEC-2024-0419", # gtk-sys / gtk-rs GTK3
    "RUSTSEC-2024-0420", # gtk3-macros / gtk-rs GTK3

    # proc-macro-error — unmaintained (replaced by proc-macro-error2).
    # Pulled in transitively via tauri-codegen → rfd / file-dialog stacks.
    # No direct fix available until upstream bumps.
    "RUSTSEC-2024-0370",

    # fxhash — unmaintained. Pulled in via selectors → kuchikiki →
    # tauri-utils. Upstream recommends rustc-hash. Blocked on
    # tauri-utils update.
    "RUSTSEC-2025-0057",

    # unic-* crates — unmaintained. Transitive via dioxus's HTML parsing
    # path (dioxus → dioxus-html → ... → unic-ucd-ident). No drop-in
    # replacement with the same API; blocked on upstream migration to
    # `icu_properties` or equivalent.
    "RUSTSEC-2025-0075", # unic-char-range
    "RUSTSEC-2025-0080", # unic-common
    "RUSTSEC-2025-0081", # unic-char-property
    "RUSTSEC-2025-0098", # unic-ucd-version
    "RUSTSEC-2025-0100", # unic-ucd-ident
]

[licenses]
version = 2
confidence-threshold = 0.93

# The full allow-list. Anything a dependency (or workspace member) declares
# that is NOT in this list fails the build. GPL / AGPL / SSPL / MPL / LGPL
# are deliberately absent.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "0BSD",
    # Used by webpki-roots (transitive through reqwest/rustls). Permissive,
    # OSI-style, patent grant included.
    "CDLA-Permissive-2.0",
]

# Per-crate license exceptions live here when (and only when) a reviewer has
# signed off on vendoring a copyleft dep. Each entry should be accompanied by
# a commit message explaining why.
exceptions = [
    # Transitive dep via `directories` → `dirs-sys`. MPL-2.0 is weak/file-
    # level copyleft; we ship it as an unmodified dependency crate, which
    # satisfies the MPL without forcing our own source under it (see
    # MPL-2.0 §1.10 "Source Code Form" and §3.3 "Distribution of a
    # Modified Version" — neither triggers here). Revisit if we ever
    # vendor a modified fork.
    { allow = ["MPL-2.0"], crate = "option-ext" },

    # Servo CSS stack — `selectors`, `cssparser`, `cssparser-macros`,
    # `dtoa-short`. Transitive deps via `wry` → `dom_query` / HTML tree
    # querying on the Tauri desktop stack. Same MPL-2.0 reasoning as
    # `option-ext`: shipped as unmodified upstream crates, so MPL's §3.3
    # (Modified Version distribution) does not reach our source.
    # Revisit if we ever vendor a fork.
    { allow = ["MPL-2.0"], crate = "selectors" },
    { allow = ["MPL-2.0"], crate = "cssparser" },
    { allow = ["MPL-2.0"], crate = "cssparser-macros" },
    { allow = ["MPL-2.0"], crate = "dtoa-short" },
]

# Crates with missing or incomplete `license` fields in their manifests:
# point cargo-deny at an upstream LICENSE so the check is still enforced.
[[licenses.clarify]]
crate = "cfg_block"
# `cfg_block` is upstream-licensed MIT (README and repo root LICENSE file).
# The crate's Cargo.toml is missing a `license` field; we pin the hash of
# its LICENSE content so cargo-deny treats the dep as properly licensed.
expression = "MIT"
license-files = [{ path = "LICENSE", hash = 0 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
