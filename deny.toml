# SPDX-License-Identifier: Apache-2.0
#
# cargo-deny policy for Capytain.
#
# Policy shape (DESIGN.md §10.2 step 6):
#   (a) Fail the build on any dependency under GPL, AGPL, SSPL, or any
#       non-OSI license.
#   (b) Require explicit, deliberate review before vendoring copyleft
#       licenses (MPL, LGPL). We implement "warn + special handling" as
#       "fail by default; add to `[licenses.exceptions]` with a per-crate
#       justification" — the exceptions entry is the special handling.
#   (c) Every workspace `Cargo.toml` declares `license = "Apache-2.0"`.
#       cargo-deny checks workspace members alongside dependencies, so the
#       allow-list below enforces this automatically.
#
# All four sections use the v2 schema (cargo-deny 0.14+).

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
    # --- Servo-transitive advisories ---
    #
    # bincode 1.3.3 — unmaintained (RUSTSEC-2025-0141). Author
    # deprecated the 1.x series after a harassment incident; upstream
    # considers 1.3.3 a complete release. Pulled in via `webrender
    # 0.68` → `servo`. Not a vulnerability, informational only.
    # Revisit when Servo migrates webrender to a maintained serializer
    # (postcard / rkyv / bitcode).
    "RUSTSEC-2025-0141",

    # --- Timing side-channels in Servo-transitive crypto crates ---
    #
    # Both advisories are real timing side-channels in cryptographic signing
    # / key operations, but neither is reachable in Capytain's use of Servo:
    # `capytain_renderer::servo::apply_reader_pane_preferences` disables
    # every DOM API (serviceworker, webrtc, webgpu, …) that could let email
    # content reach WebCrypto's `SubtleCrypto` — the only path the reader
    # pipeline could exercise these crates through. The sanitizer upstream
    # also strips `<script>` tags before `render()`, so no DOM JS runs at
    # all. Revisit if a future phase enables SubtleCrypto in rendered
    # content.
    "RUSTSEC-2025-0144", # ml-dsa 0.0.4 — timing side-channel in ML-DSA Decompose
    "RUSTSEC-2023-0071", # rsa 0.9.10 — Marvin Attack (no safe upgrade upstream)

    # paste 1.0.15 — unmaintained (RUSTSEC-2024-0436). Transitive dep pulled
    # in through Turso / clap ancestry. The advisory is informational, not a
    # vulnerability; upstream recommends `pastey` as a drop-in, but we're
    # not in a position to force that substitution through our dep graph.
    # Revisit when Turso or clap bump to a paste-free release.
    "RUSTSEC-2024-0436",

    # Unmaintained-advisory ignores for the Tauri 2 desktop shell (Phase 0
    # Week 5). Tauri's Linux backend pulls in the gtk-rs GTK3 bindings
    # transitively via tao/wry/tray-icon/muda. The upstream recommendation
    # is gtk4-rs, but Tauri 2 has not yet migrated. These are
    # informational unmaintained advisories, not vulnerabilities. Revisit
    # when Tauri ships a GTK4 backend.
    "RUSTSEC-2024-0411", # atk / gtk-rs GTK3
    "RUSTSEC-2024-0412", # atk-sys / gtk-rs GTK3
    "RUSTSEC-2024-0413", # gdk / gtk-rs GTK3
    "RUSTSEC-2024-0414", # gdk-pixbuf / gtk-rs GTK3 (direct dep via linux_gtk)
    "RUSTSEC-2024-0415", # gdk-sys / gtk-rs GTK3
    "RUSTSEC-2024-0416", # gdkx11 / gtk-rs GTK3
    "RUSTSEC-2024-0417", # glib / gtk-rs GTK3 (direct dep via linux_gtk)
    "RUSTSEC-2024-0418", # gtk / gtk-rs GTK3
    "RUSTSEC-2024-0419", # gtk-sys / gtk-rs GTK3
    "RUSTSEC-2024-0420", # gtk3-macros / gtk-rs GTK3

    # RUSTSEC-2024-0429 — `glib 0.18` `VariantStrIter::impl_get` unsound:
    # `&p` passed to a C out-parameter function, which recent rustc
    # optimizations now disregard, leading to NULL-deref panics on iter.
    # Not reachable in Capytain: we never construct a `glib::Variant`
    # containing nested strings, nor call `VariantStrIter`. The Tauri 2
    # Linux backend uses glib GObject methods + signal handlers, not
    # Variant container iteration. Revisit when Tauri / gtk-rs migrate
    # to GTK4 (the issue is fixed in `glib 0.19+`, which requires the
    # gtk-rs 0.19 / GTK4 family).
    "RUSTSEC-2024-0429",

    # proc-macro-error — unmaintained (replaced by proc-macro-error2).
    # Pulled in transitively via tauri-codegen → rfd / file-dialog stacks.
    # No direct fix available until upstream bumps.
    "RUSTSEC-2024-0370",

    # fxhash — unmaintained. Pulled in via selectors → kuchikiki →
    # tauri-utils. Upstream recommends rustc-hash. Blocked on
    # tauri-utils update.
    "RUSTSEC-2025-0057",

    # unic-* crates — unmaintained. Transitive via dioxus's HTML parsing
    # path (dioxus → dioxus-html → ... → unic-ucd-ident). No drop-in
    # replacement with the same API; blocked on upstream migration to
    # `icu_properties` or equivalent.
    "RUSTSEC-2025-0075", # unic-char-range
    "RUSTSEC-2025-0080", # unic-common
    "RUSTSEC-2025-0081", # unic-char-property
    "RUSTSEC-2025-0098", # unic-ucd-version
    "RUSTSEC-2025-0100", # unic-ucd-ident
]

[licenses]
version = 2
confidence-threshold = 0.93

# The full allow-list. Anything a dependency (or workspace member) declares
# that is NOT in this list fails the build. GPL / AGPL / SSPL / MPL / LGPL
# are deliberately absent — MPL-2.0 appears instead as per-crate exceptions
# below, with reviewer sign-off for each.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "0BSD",
    # Used by webpki-roots (transitive through reqwest/rustls). Permissive,
    # OSI-style, patent grant included.
    "CDLA-Permissive-2.0",
    # Boost Software License — permissive, OSI-approved, similar scope to
    # MIT. Pulled in via `clipboard-win` and `error-code` (Windows-only
    # transitive deps of the Servo stack). Not copyleft.
    "BSL-1.0",
    # University of Illinois / NCSA Open Source License — permissive,
    # OSI-approved, BSD-style. Used by the LLVM project and its satellites;
    # pulled in via `libfuzzer-sys` through the Servo stack. Not copyleft.
    "NCSA",
]

# Per-crate license exceptions live here when (and only when) a reviewer has
# signed off on vendoring a copyleft dep. Each entry should be accompanied by
# a commit message explaining why.
#
# Universal MPL-2.0 reasoning for all entries below (§10.2 step 6 per-crate
# justification): MPL-2.0 is weak, file-level copyleft. We consume each of
# these crates as an unmodified upstream package (no vendored forks, no
# local patches). Per MPL-2.0 §1.10 ("Source Code Form") and §3.3
# ("Distribution of a Modified Version"), an unmodified consumer does not
# trigger the Modified-Version distribution obligations. Our first-party
# code stays under Apache-2.0. If we ever vendor a local fork of any of
# these crates, that specific entry needs re-review — the unmodified-
# consumer reasoning no longer applies.
exceptions = [
    # --- Pre-Servo MPL-2.0 deps (Phase 0 Week 5, Tauri / Dioxus stack) ---

    # Transitive dep via `directories` → `dirs-sys`.
    { allow = ["MPL-2.0"], crate = "option-ext" },

    # Servo CSS stack consumed through `wry` → `dom_query` / HTML tree
    # querying on the Tauri desktop stack.
    { allow = ["MPL-2.0"], crate = "selectors" },
    { allow = ["MPL-2.0"], crate = "cssparser" },
    { allow = ["MPL-2.0"], crate = "cssparser-macros" },
    { allow = ["MPL-2.0"], crate = "dtoa-short" },

    # --- Servo 0.1.0 engine and its MPL-2.0-licensed vendored tree ---
    # Pulled in by `capytain-renderer` (Phase 0 Week 6 Day 2). Every entry
    # below is a direct or transitive dep of `servo = "0.1"`; the list is
    # exhaustive against the cargo-deny check at the HEAD of the Day 2
    # PR — new Servo releases may add or remove crates here, and each
    # change needs explicit review.
    #
    # Sorted alphabetically within the block for easier diff review when
    # the servo crate bumps.
    { allow = ["MPL-2.0"], crate = "accountable-refcell" },
    { allow = ["MPL-2.0"], crate = "app_units" },
    { allow = ["MPL-2.0"], crate = "dwrote" },
    { allow = ["MPL-2.0"], crate = "mozjs" },
    { allow = ["MPL-2.0"], crate = "mozjs_sys" },
    { allow = ["MPL-2.0"], crate = "plane-split" },
    { allow = ["MPL-2.0"], crate = "servo" },
    { allow = ["MPL-2.0"], crate = "servo-allocator" },
    { allow = ["MPL-2.0"], crate = "servo-background-hang-monitor" },
    { allow = ["MPL-2.0"], crate = "servo-background-hang-monitor-api" },
    { allow = ["MPL-2.0"], crate = "servo-base" },
    { allow = ["MPL-2.0"], crate = "servo-canvas" },
    { allow = ["MPL-2.0"], crate = "servo-canvas-traits" },
    { allow = ["MPL-2.0"], crate = "servo-config" },
    { allow = ["MPL-2.0"], crate = "servo-config-macro" },
    { allow = ["MPL-2.0"], crate = "servo-constellation" },
    { allow = ["MPL-2.0"], crate = "servo-constellation-traits" },
    { allow = ["MPL-2.0"], crate = "servo-default-resources" },
    { allow = ["MPL-2.0"], crate = "servo-deny-public-fields" },
    { allow = ["MPL-2.0"], crate = "servo-devtools" },
    { allow = ["MPL-2.0"], crate = "servo-devtools-traits" },
    { allow = ["MPL-2.0"], crate = "servo-dom-struct" },
    { allow = ["MPL-2.0"], crate = "servo-embedder-traits" },
    { allow = ["MPL-2.0"], crate = "servo-fonts" },
    { allow = ["MPL-2.0"], crate = "servo-fonts-traits" },
    { allow = ["MPL-2.0"], crate = "servo-geometry" },
    { allow = ["MPL-2.0"], crate = "servo-jstraceable-derive" },
    { allow = ["MPL-2.0"], crate = "servo-layout" },
    { allow = ["MPL-2.0"], crate = "servo-layout-api" },
    { allow = ["MPL-2.0"], crate = "servo-media" },
    { allow = ["MPL-2.0"], crate = "servo-media-audio" },
    { allow = ["MPL-2.0"], crate = "servo-media-derive" },
    { allow = ["MPL-2.0"], crate = "servo-media-dummy" },
